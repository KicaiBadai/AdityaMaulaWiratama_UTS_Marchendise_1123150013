name: backend_firebase
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10

  # State Management
  provider: ^6.1.5+1

  # Firebase (Versi STABIL untuk Windows)
  firebase_core: ^3.12.1 # ← Turunkan dari ^4.6.0
  firebase_auth: ^5.5.1 # ← Turunkan dari ^6.3.0
  google_sign_in: ^6.2.2

  # HTTP Client
  dio: ^5.9.2

  # Local Storage
  flutter_secure_storage: ^10.0.0

  # Utilities
  equatable: ^2.0.5
  email_validator: ^3.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
